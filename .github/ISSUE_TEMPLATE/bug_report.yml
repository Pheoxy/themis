name: Bug Report
description: Report a reproducible Themis failure, crash, or incorrect result.
title: "Bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Use this for reproducible Themis behavior problems. Do not include secrets or private repository contents.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem.
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the exact command or GitHub Action workflow input.
      render: bash
    validations:
      required: true
  - type: dropdown
    id: status
    attributes:
      label: Themis Status
      options:
        - pass
        - blocked
        - error
        - unknown
    validations:
      required: true
  - type: input
    id: exit-code
    attributes:
      label: Exit Code
  - type: input
    id: finding-codes
    attributes:
      label: Finding Codes
  - type: dropdown
    id: output-format
    attributes:
      label: Output Format
      options:
        - markdown
        - json
        - comment
        - sarif
        - other
  - type: textarea
    id: target-context
    attributes:
      label: Target Repository Context
      description: Include language/ecosystem, relevant upstream rules, PR template sections, and `.themis.toml` settings.
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include validation report excerpts, target repository rules, and exact test/check output.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - Themis version:
        - Nix flake revision:
        - Operating system:
        - GitHub Action run, if applicable:
    validations:
      required: true
