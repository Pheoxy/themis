name: Themis Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  self-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write smoke PR body
        run: |
          cat > pr-body.md <<'EOF'
          ## Summary

          Smoke-test the Themis GitHub Action before release.

          ## Validation

          - [x] I ran `nix flake check`.
          - [x] I updated tests for behavior changes.
          - [x] I regenerated `docs/cli.md` when CLI behavior changed.
          - [x] I updated `CHANGELOG.md` or explain why no changelog entry is needed below.
          - [x] I reviewed the target repository rules affected by this change.

          ## Test Evidence

          nix flake check passed locally before dispatch.

          ## AI Assistance

          AI assistance: No AI assistance was used for the synthetic smoke-test PR body.

          Human accountability: I, not Themis or any AI tool, take responsibility for every line, including tests, licensing, security, and project policy compliance.

          ## Changelog Decision

          Changelog: Not needed because this is a CI smoke-test body generated inside a workflow.
          EOF

      - id: themis
        uses: ./
        with:
          workflow: self-check
          base: HEAD~1
          body-file: pr-body.md
          evidence: nix flake check passed locally before dispatch.
          human-authored: "true"
          run-checks: "true"
          output: smoke-report.md

      - name: Verify action outputs
        run: |
          test "${{ steps.themis.outputs.status }}" = "pass"
          test "${{ steps.themis.outputs.exit-code }}" = "0"
          test "${{ steps.themis.outputs.report }}" = "smoke-report.md"
          test -s smoke-report.md
