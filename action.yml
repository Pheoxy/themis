name: Themis
description: Paranoid upstream validation gate for AI-assisted code submissions.

inputs:
  repo:
    description: Repository path to validate.
    default: .
  base:
    description: Base ref for the PR diff, for example origin/main.
    default: ""
  body-file:
    description: File containing the pull request body.
    default: ""
  evidence:
    description: Inline test evidence.
    default: ""
  evidence-file:
    description: File containing test evidence.
    default: ""
  human-authored:
    description: Set to true only when no AI assistance was used.
    default: "false"
  run-checks:
    description: Run required_checks from .themis.toml.
    default: "true"
  workflow:
    description: Themis workflow to run. Use validate, guide, maintainer-packet, self-check, or config-check.
    default: validate
  output:
    description: Themis output path.
    default: upstream-validation-report.md
  format:
    description: Themis output format. Use markdown, comment, json, or sarif. config-check supports markdown or json.
    default: markdown
  annotations:
    description: CI annotation mode. Use github for GitHub workflow annotations or none to disable.
    default: github
  step-summary:
    description: Write the gate output to the GitHub Step Summary when possible.
    default: "true"
  comment-pr:
    description: Post the generated gate output as a pull request comment using gh.
    default: "false"
  pr-number:
    description: Pull request number for comment-pr. Defaults to github.event.pull_request.number when available.
    default: ""
  draft-pr:
    description: Create a draft PR with gh after validation passes.
    default: "false"
  title:
    description: Draft PR title override.
    default: ""
  base-branch:
    description: Draft PR base branch override.
    default: ""
  head-branch:
    description: Draft PR head branch override.
    default: ""
  install-nix:
    description: Install Nix before running.
    default: "true"

outputs:
  status:
    description: Themis workflow status, either pass or blocked.
    value: ${{ steps.validate.outputs.status }}
  exit-code:
    description: Themis CLI exit code.
    value: ${{ steps.validate.outputs.exit-code }}
  report:
    description: Path to the generated Themis output.
    value: ${{ steps.validate.outputs.report }}

runs:
  using: composite
  steps:
    - name: Install Nix
      if: ${{ inputs.install-nix == 'true' }}
      uses: DeterminateSystems/nix-installer-action@v16

    - name: Validate upstream readiness
      id: validate
      shell: bash
      env:
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_BASE: ${{ inputs.base }}
        INPUT_BODY_FILE: ${{ inputs.body-file }}
        INPUT_EVIDENCE: ${{ inputs.evidence }}
        INPUT_EVIDENCE_FILE: ${{ inputs.evidence-file }}
        INPUT_HUMAN_AUTHORED: ${{ inputs.human-authored }}
        INPUT_RUN_CHECKS: ${{ inputs.run-checks }}
        INPUT_WORKFLOW: ${{ inputs.workflow }}
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_ANNOTATIONS: ${{ inputs.annotations }}
        INPUT_DRAFT_PR: ${{ inputs.draft-pr }}
        INPUT_TITLE: ${{ inputs.title }}
        INPUT_BASE_BRANCH: ${{ inputs.base-branch }}
        INPUT_HEAD_BRANCH: ${{ inputs.head-branch }}
      run: |
        set -euo pipefail
        case "$INPUT_WORKFLOW" in
          validate)
            command=(validate)
            ;;
          guide)
            command=(guide)
            ;;
          maintainer-packet)
            command=(maintainer-packet)
            ;;
          self-check)
            command=(self-check)
            ;;
          config-check)
            command=(config check)
            ;;
          *)
            printf 'Unsupported Themis workflow: %s\n' "$INPUT_WORKFLOW" >&2
            exit 3
            ;;
        esac
        if [[ "$INPUT_DRAFT_PR" == "true" ]]; then
          command=(pull-request draft)
        fi
        if [[ "${command[0]}" == "self-check" && "$INPUT_FORMAT" != "markdown" && "$INPUT_FORMAT" != "json" ]]; then
          printf 'Unsupported format for self-check: %s\n' "$INPUT_FORMAT" >&2
          exit 3
        fi
        if [[ "${command[0]}" == "config" && "$INPUT_FORMAT" != "markdown" && "$INPUT_FORMAT" != "json" ]]; then
          printf 'Unsupported format for config-check: %s\n' "$INPUT_FORMAT" >&2
          exit 3
        fi
        args=(--repo "$INPUT_REPO" --output "$INPUT_OUTPUT" --format "$INPUT_FORMAT")
        if [[ "${command[0]}" != "config" && -n "$INPUT_BASE" ]]; then
          args+=(--base "$INPUT_BASE")
        fi
        if [[ "${command[0]}" != "config" ]]; then
          args+=(--annotations "$INPUT_ANNOTATIONS")
        fi
        if [[ "${command[0]}" != "config" && -n "$INPUT_BODY_FILE" ]]; then
          args+=(--body-file "$INPUT_BODY_FILE")
        fi
        if [[ "${command[0]}" != "config" && -n "$INPUT_EVIDENCE" ]]; then
          args+=(--evidence "$INPUT_EVIDENCE")
        fi
        if [[ "${command[0]}" != "config" && -n "$INPUT_EVIDENCE_FILE" ]]; then
          args+=(--evidence-file "$INPUT_EVIDENCE_FILE")
        fi
        if [[ "${command[0]}" != "config" && "$INPUT_HUMAN_AUTHORED" == "true" ]]; then
          args+=(--human-authored)
        fi
        if [[ "${command[0]}" != "pull-request" && "${command[0]}" != "config" && "$INPUT_RUN_CHECKS" == "true" ]]; then
          args+=(--run-checks)
        fi
        if [[ "${command[0]}" == "pull-request" && "$INPUT_RUN_CHECKS" != "true" ]]; then
          args+=(--skip-checks)
        fi
        if [[ -n "$INPUT_TITLE" ]]; then
          args+=(--title "$INPUT_TITLE")
        fi
        if [[ -n "$INPUT_BASE_BRANCH" ]]; then
          args+=(--base-branch "$INPUT_BASE_BRANCH")
        fi
        if [[ -n "$INPUT_HEAD_BRANCH" ]]; then
          args+=(--head-branch "$INPUT_HEAD_BRANCH")
        fi
        set +e
        nix run "$GITHUB_ACTION_PATH" -- "${command[@]}" "${args[@]}"
        exit_code=$?
        set -e
        status=pass
        if [[ "$exit_code" != "0" ]]; then
          status=blocked
        fi
        {
          printf 'status=%s\n' "$status"
          printf 'exit-code=%s\n' "$exit_code"
          printf 'report=%s\n' "$INPUT_OUTPUT"
        } >> "$GITHUB_OUTPUT"
        exit "$exit_code"

    - name: Write step summary
      if: always() && inputs.step-summary == 'true' && inputs.output != ''
      shell: bash
      env:
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_FORMAT: ${{ inputs.format }}
      run: |
        set -euo pipefail
        if [[ ! -f "$INPUT_OUTPUT" || -z "${GITHUB_STEP_SUMMARY:-}" ]]; then
          exit 0
        fi
        if [[ "$INPUT_FORMAT" == "markdown" ]]; then
          cat "$INPUT_OUTPUT" >> "$GITHUB_STEP_SUMMARY"
        else
          {
            printf '## Themis %s output\n\n' "$INPUT_FORMAT"
            printf '```%s\n' "$INPUT_FORMAT"
            cat "$INPUT_OUTPUT"
            printf '\n```\n'
          } >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Comment on pull request
      if: always() && inputs.comment-pr == 'true' && inputs.output != ''
      shell: bash
      env:
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_PR_NUMBER: ${{ inputs.pr-number }}
        EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        set -euo pipefail
        if [[ ! -f "$INPUT_OUTPUT" ]]; then
          printf '::warning::Themis report file does not exist; skipping PR comment.\n'
          exit 0
        fi
        pr_number="$INPUT_PR_NUMBER"
        if [[ -z "$pr_number" ]]; then
          pr_number="$EVENT_PR_NUMBER"
        fi
        if [[ -z "$pr_number" ]]; then
          printf '::warning::No pull request number available; skipping Themis PR comment.\n'
          exit 0
        fi
        if ! gh pr comment "$pr_number" --body-file "$INPUT_OUTPUT"; then
          printf '::warning::Failed to post Themis PR comment. Check pull-requests: write permission and GH_TOKEN.\n'
        fi

    - name: Upload validation report
      if: always() && inputs.output != ''
      uses: actions/upload-artifact@v4
      with:
        name: upstream-validation-report
        path: ${{ inputs.output }}
