name: Themis Config Check

on:
  pull_request:
    paths:
      - ".themis.toml"
      - "docs/schema/themis.schema.json"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  config-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Pheoxy/themis@v1.0.0
        with:
          workflow: config-check
          format: markdown
          output: themis-config-check.md
